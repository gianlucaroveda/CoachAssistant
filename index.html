<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#051D2C">
<title>Coach — Allenamenti</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link href="style.css" rel="stylesheet">

</head>
<body>

<div class="app">

  <div class="particles" id="particles"></div>

  <header>
    <div class="eyebrow">Sessione di oggi</div>
    <div class="clock"><span id="clock-time">--:--</span><span class="sec" id="clock-sec">--</span></div>
    <div class="date-row" id="clock-date">—</div>
  </header>

  <div class="controls">
    <button class="ctrl-btn primary" id="btn-generate" title="Genera l'allenamento">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
        <circle cx="9" cy="12" r="1" fill="currentColor"/>
        <circle cx="15" cy="12" r="1" fill="currentColor"/>
        <path d="M9 16c.5.5 1.5 1 3 1s2.5-.5 3-1"/>
      </svg>
      Genera
    </button>
    <button class="ctrl-btn" id="btn-search" title="Cerca esercizio">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/>
        <path d="m21 21-4.3-4.3"/>
      </svg>
      Cerca
    </button>
    <button href="impostazioni.html" class="ctrl-btn " id="btn-settings" title="Impostazioni">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Impostazioni
    </button>
  </div>

  <main id="list">
    <!-- popolato via JS -->
  </main>

    <div class="fab-zone">

    <!-- indicatore tempo, in basso a sinistra -->
    <button class="fab-time" id="time-indicator" title="Metti in pausa">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="time-indicator-icon"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      <span id="time-indicator-value">00:00</span>
    </button>
    <!-- il tuo + originale, invariato -->
    <button class="fab" id="fab-add" title="Aggiungi esercizio">
      <div class="sonar" id="sonar"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>

    <!-- orologio, in basso a destra -->
    <button class="fab-secondary" id="fab-timer" title="Timer / Cronometro">
      <div class="sonar" id="sonar-timer"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
    </button>

  </div>
</div>



<!-- MODAL: aggiungi esercizio -->
<div class="modal-overlay" id="modal-overlay">
  <div class="app-width">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2>Nuovo esercizio</h2>
      <form id="exercise-form">

        <div class="field">
          <label for="f-title">Titolo</label>
          <input type="text" id="f-title" placeholder="Es. Tiri da tre in sospensione" required maxlength="40">
        </div>

        <div class="field-row">
          <div class="field">
            <label for="f-type">Tipologia</label>
            <select id="f-type" required>
              <option value="" disabled selected>Scegli...</option>
              <!-- opzioni generate via JS da TYPE_OPTIONS -->
            </select>
          </div>
        </div>

        <div class="field">
          <label>Tag</label>
          <div class="tag-picker" id="tag-picker">
            <!-- pillole generate via JS da TAG_OPTIONS -->
          </div>
        </div>

        <div class="field">
          <label for="f-description">Spiegazione</label>
          <textarea id="f-description" placeholder="Come si esegue l'esercizio, cosa serve, punti chiave..." required maxlength="500"></textarea>
        </div>

        <div class="field">
          <label for="f-video">Video (opzionale)</label>
          <div class="input-with-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect x="2" y="6" width="14" height="12" rx="2"/></svg>
            <input type="url" id="f-video" placeholder="Link Instagram, YouTube, TikTok...">
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-cancel" id="btn-cancel">Annulla</button>
          <button type="submit" class="btn btn-save">Aggiungi</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- MODAL: timer / cronometro -->
<div class="modal-overlay" id="timer-overlay">
  <div class="app-width">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2>Timer & Cronometro</h2>

      <div class="timer-tabs">
        <button type="button" class="timer-tab active" data-mode="timer">Timer</button>
        <button type="button" class="timer-tab" data-mode="stopwatch">Cronometro</button>
      </div>

      <div class="timer-display-wrap">
        <div class="timer-display" id="timer-big-display">00:00</div>
        <div class="timer-status" id="timer-status">Pronto</div>
      </div>

      <div class="timer-setup" id="timer-setup">
        <div class="wheel-picker">
          <div class="wheel-highlight"></div>
          <div class="wheel-col" id="wheel-minutes">
            <div class="wheel-track" id="wheel-minutes-track"></div>
          </div>
          <div class="wheel-sep">:</div>
          <div class="wheel-col" id="wheel-seconds">
            <div class="wheel-track" id="wheel-seconds-track"></div>
          </div>
        </div>
        <div class="wheel-labels">
          <span>minuti</span><span>secondi</span>
        </div>
      </div>

      <div class="timer-controls">
        <button type="button" class="timer-btn timer-btn-reset" id="timer-reset" title="Azzera">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 3v6h6"/></svg>
        </button>
        <button type="button" class="timer-btn timer-btn-main" id="timer-toggle" title="Avvia">
          <svg viewBox="0 0 24 24" fill="currentColor" id="timer-toggle-icon"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button type="button" class="timer-btn timer-btn-close" id="timer-close" title="Chiudi">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: genera allenamento -->
<div class="modal-overlay" id="generate-overlay">
  <div class="app-width">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2>Genera allenamento</h2>
      <div class="sub">Un esercizio per ogni tipologia. Filtra per tag (opzionale).</div>

      <div class="field">
        <label>Tag (opzionale)</label>
        <div class="tag-picker" id="generate-tag-picker">
          <!-- pillole generate via JS da TAG_OPTIONS -->
        </div>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn btn-cancel" id="generate-cancel">Annulla</button>
        <button type="button" class="btn btn-save" id="generate-confirm">Genera adesso</button>
      </div>
    </div>
  </div>
</div>
<div class="toast-container" id="toast-container"></div>
<script src="orologio.js"></script>
<script src="playlist_esercizi.js"></script>
<script src="timer.js"></script>
<script src="aggiungi_esercizio.js"></script>
<script>
(function() {
  /*navigazione verso impostazioni.html*/
  document.getElementById('btn-settings').addEventListener('click', () => {
    window.location.href = 'impostazioni.html';
  });


  document.getElementById('btn-search').addEventListener('click', () => {
    window.location.href = 'cerca.html';
  });

/* ---------------- GENERA ALLENAMENTO (un esercizio per tipologia) ---------------- */

// popola le pillole tag nella modale "genera" (riusa TAG_OPTIONS già definito)
const generateTagPicker = document.getElementById('generate-tag-picker');
let generateSelectedTags = [];
TAG_OPTIONS.forEach(tag => {
  const pill = document.createElement('button');
  pill.type = 'button';
  pill.className = 'tag-pill';
  pill.textContent = tag;
  pill.dataset.tag = tag;
  pill.addEventListener('click', () => {
    pill.classList.toggle('selected');
    generateSelectedTags = generateSelectedTags.includes(tag)
      ? generateSelectedTags.filter(t => t !== tag)
      : [...generateSelectedTags, tag];
  });
  generateTagPicker.appendChild(pill);
});

const generateOverlay = document.getElementById('generate-overlay');

// il bottone "Genera" in alto ora apre la modale invece di generare subito
document.getElementById('btn-generate').addEventListener('click', () => {
  generateOverlay.classList.add('open');
});

document.getElementById('generate-cancel').addEventListener('click', () => {
  generateOverlay.classList.remove('open');
});
generateOverlay.addEventListener('click', (e) => {
  if(e.target === generateOverlay) generateOverlay.classList.remove('open');
});

// il vero motore di generazione: un esercizio a caso per ogni tipologia
document.getElementById('generate-confirm').addEventListener('click', () => {
  const addedIds = new Set(exercises.map(e => e.id));
  const missingTypes = [];
  let addedCount = 0;

  TYPE_OPTIONS.forEach(type => {
    const candidates = templates.filter(t =>
      t.type === type &&
      !addedIds.has(t.id) &&
      (generateSelectedTags.length === 0 || (t.tags || []).some(tag => generateSelectedTags.includes(tag)))
    );

    if(candidates.length === 0){
      missingTypes.push(type);
      return;
    }

    const pick = candidates[Math.floor(Math.random() * candidates.length)];
    addExercise(pick);
    addedIds.add(pick.id); // evita che due tipologie peschino lo stesso esercizio
    addedCount++;
  });

  generateOverlay.classList.remove('open');

  if(addedCount === 0){
    showToast('Nessun esercizio trovato con questi filtri');
  }else if(missingTypes.length > 0){
    showToast(`Aggiunti ${addedCount} esercizi — mancano: ${missingTypes.join(', ')}`);
  }else{
    showToast(`Allenamento generato: ${addedCount} esercizi`);
  }
});


  /* ---------------- SERVICE WORKER (PWA) ---------------- */
  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    });
  }

})();
</script>

</body>
</html>
